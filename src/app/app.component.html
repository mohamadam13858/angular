<div class="container">
    <div class="row justify-content-center align-content-center">
        <div class="col-12 col-md-6">
            <label>UserName:</label>
            <input type="text" class="form-control" (keypress)="clickFunctionEvent($event)" [(ngModel)]="username">
        </div>
        <div class="col-12 col-md-6 mt-3">
            <h1>username : {{username}}</h1>
        </div>
        <div class="col-12 col-md-4">
            
            <button class="btn btn-success" (click)="click()" [disabled]="username==''">reset</button>
        </div>

    </div>
</div>
