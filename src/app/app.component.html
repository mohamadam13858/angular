<div class="container">
    <div class="row justify-content-center align-content-center">
        <div class="col-12 col-md-6">
            <label>UserName:</label>
            <input type="text" class="form-control" (keypress)="clickFunctionEvent($event)" [(ngModel)]="username">
        </div>
        <div class="col-12 col-md-6 mt-3">
            <p *ngIf="isShowServers"> username : {{username}}</p>
        </div>
        <div class="col-12 col-md-4">
            <button class="btn btn-success m-2" (click)="click()" [disabled]="username==''">reset</button>
            <button class="btn btn-success m-2" (click)="clickFunctionEvent($event)">reset</button>
        </div>

    </div>
</div>
